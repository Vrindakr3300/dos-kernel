<svg xmlns="http://www.w3.org/2000/svg" width="124" height="20" role="img" aria-label="verified by: DOS">
  <title>verified by DOS</title>
  <desc>This repo gates its agents' ship-claims with dos verify — ground truth from git, not the agent's word.</desc>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r"><rect width="124" height="20" rx="3" fill="#fff"/></clipPath>
  <g clip-path="url(#r)">
    <rect width="73" height="20" fill="#24292e"/>
    <rect x="73" width="51" height="20" fill="#2ea44f"/>
    <rect width="124" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
    <text x="37" y="15" fill="#010101" fill-opacity=".3">verified by</text>
    <text x="37" y="14">verified by</text>
    <text x="97" y="15" fill="#010101" fill-opacity=".3" font-weight="bold">DOS</text>
    <text x="97" y="14" font-weight="bold">DOS</text>
