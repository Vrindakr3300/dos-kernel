name: CI

# The kernel suite must stay green (CLAUDE.md: "the full kernel suite must stay
# green"), and the wheel must stay publishable. This workflow proves both on a
# clean machine, across the supported Python versions and on both POSIX and
# Windows (DOS is developed on Windows and consumed on Linux — both matter).
#
# It runs the *installed* package, not a PYTHONPATH=src shim: an editable install
# then `pytest` + a `dos` CLI smoke, so what CI validates is what a user gets.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The pre-publish leak gate, run on EVERY push/PR — the durable fix for the
  # recurring failure where the seed-time leak scan went stale and new commits
  # reintroduced private dev paths / the dev hostname into public-bound files
  # (docs/281 etc.). `scripts/leak_scan.py` is the single source of truth for the
  # forbidden-pattern set; the seed gate calls the same module. Pure stdlib, no
  # install. A hit fails the build — a leak is a refusal, not a warning (this is the
  # CI floor under the dos.toml [reasons.PUBLISH_LEAK] refusal).
  #
  # The scanner is deliberately EXCLUDED from the public seed (its pattern list
  # names the very strings it forbids), so this same workflow also runs in the
  # seeded public repo where the file is absent. There the job is a green no-op:
  # the gate already ran in the private repo's CI and again at seed time.
  leak-scan:
    name: pre-publish leak scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Scan the shippable tree for private paths / hostnames
        run: |
          if [ -f scripts/leak_scan.py ]; then
            python scripts/leak_scan.py
          else
            echo "leak scanner not shipped in this tree (public seed) — gate ran in the private repo and at seed time; skipping"
          fi

  lint:
    name: lint & type
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install (editable, with dev extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp]"
      # ruff is BLOCKING: the narrow rule set (pyflakes + import/statement shape;
      # see [tool.ruff] in pyproject) catches dead code / broken imports and is
      # green today. A new unused import or undefined name fails the build.
      - name: ruff (blocking)
        run: ruff check src/dos src/dos_mcp
      # mypy is ADVISORY for now (continue-on-error): ~30 findings remain across
      # the package, several blocked behind in-flight files. This surfaces them on
      # every PR without blocking; it RATCHETS to blocking once paid down (then
      # drop continue-on-error + add disallow_untyped_defs to [tool.mypy]).
      - name: mypy (advisory)
        continue-on-error: true
        run: mypy

  test:
    name: test (py${{ matrix.python-version }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.11", "3.12", "3.13"]
        include:
          # One Windows leg on the primary Python — the dev platform; cheap
          # insurance against path/encoding regressions without a full matrix.
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # uv on PATH so the two uv install levels in tests/test_install_levels.py
      # (uvx ephemeral + uv tool install — the installs docs/INSTALL.md leads
      # with) actually RUN here instead of skipping on their `uv not installed`
      # guard. The tests isolate all uv state into tmp_path via
      # UV_CACHE_DIR/UV_TOOL_DIR/UV_TOOL_BIN_DIR and install from the local
      # checkout (dos-kernel is not on PyPI), so no cache wiring is needed.
      # Pinned to the exact tag: astral-sh/setup-uv publishes no moving major
      # refs (there is no `v8` tag or branch — a bare @v8 does not resolve).
      - uses: astral-sh/setup-uv@v8.2.0

      - name: Install (editable, with dev + mcp extras)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,mcp]"

      - name: Run the kernel suite
        run: python -m pytest -q

      - name: CLI smoke — doctor + the truth syscall on a real git repo
        shell: bash
        run: |
          dos doctor --workspace .
          tmp="$(mktemp -d)"
          cd "$tmp"
          git init -q
          git config user.email ci@example.com
          git config user.name CI
          git config commit.gpgsign false
          dos init .
          printf 'def login(): pass\n' > login.py
          git add -A
          git commit -q -m "AUTH1: ship the login endpoint"
          # SHIPPED => exit 0
          dos verify --workspace . AUTH AUTH1
          # NOT_SHIPPED => exit 1; assert the verdict-as-exit-code contract holds
          if dos verify --workspace . AUTH AUTH2; then
            echo "::error::expected NOT_SHIPPED (exit 1) for an unshipped phase"
            exit 1
          fi
          echo "CLI smoke passed: SHIPPED=0, NOT_SHIPPED=1"

  build:
    name: build & check wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      # Match the publish workflow: build the per-platform wheels (each embedding the
      # native dos-hook binary, docs/286) + the pure-source sdist, so a broken
      # build_wheels.py / Go build is caught on every push, not first at a tag.
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go/go.sum
      - name: Build per-platform wheels (+ sdist) and validate metadata
        run: |
          python -m pip install --upgrade pip build twine wheel
          python scripts/build_wheels.py
          python -m twine check dist/*
      # The byte-format guard (docs/286): each wheel must hold exactly its OWN arch's
      # binary (the build/ staging-leak regression). Opt-in via DOS_TEST_BUILD_WHEELS
      # because it runs `python -m build` in the repo root — deterministic HERE (a
      # clean, single-builder checkout), flaky on a dev's hot tree, so it is skipped in
      # the default suite and run explicitly on this clean CI checkout.
      - name: Wheel binary-format guard (clean-checkout, deterministic)
        env:
          DOS_TEST_BUILD_WHEELS: "1"
        run: |
          python -m pip install -e ".[dev]"
          python -m pytest tests/test_build_wheels_binary_format.py -q
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
